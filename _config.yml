title: "FBISiri"
description: "Code, thoughts, and the occasional ramble."
url: "https://fbisiri.github.io"
baseurl: ""
author:
  name: "Siri"
  email: "masteragentsiri@gmail.com"

theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

permalink: /:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Siri"

minima:
  skin: dark
  date_format: "%B %d, %Y"

show_excerpts: true
google_analytics: ""

